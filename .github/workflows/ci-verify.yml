name: CI Verify

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ci-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify And Lint
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Verify Workspaces
        run: npm run verify

      - name: Lint Frontend
        run: npm run lint --workspace=frontend
